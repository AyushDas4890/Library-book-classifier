<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Library Circulation Intelligence">
  <defs>
    <radialGradient id="glow" cx="82%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#c7f24a" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#c7f24a" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#c7f24a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eceae3"/>
      <stop offset="62%" stop-color="#eceae3"/>
      <stop offset="100%" stop-color="#c7f24a"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c7f24a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c7f24a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c7f24a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="#0a0a0b"/>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <!-- constellation -->
  <g stroke="#c7f24a" stroke-width="0.7" stroke-opacity="0.16">
    <line x1="120" y1="80" x2="210" y2="140"/>
    <line x1="210" y1="140" x2="160" y2="240"/>
    <line x1="210" y1="140" x2="320" y2="110"/>
    <line x1="900" y1="70" x2="980" y2="150"/>
    <line x1="980" y1="150" x2="1080" y2="120"/>
    <line x1="980" y1="150" x2="930" y2="260"/>
    <line x1="1080" y1="120" x2="1140" y2="220"/>
    <line x1="760" y1="300" x2="860" y2="250"/>
    <line x1="320" y1="110" x2="430" y2="180"/>
  </g>
  <g fill="#eceae3">
    <circle cx="120" cy="80" r="1.6" fill-opacity="0.5"><animate attributeName="fill-opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="210" cy="140" r="2.0" fill="#c7f24a"><animate attributeName="fill-opacity" values="1;0.4;1" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="240" r="1.4" fill-opacity="0.4"/>
    <circle cx="320" cy="110" r="1.6" fill-opacity="0.55"><animate attributeName="fill-opacity" values="0.55;1;0.55" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="180" r="1.3" fill-opacity="0.35"/>
    <circle cx="900" cy="70" r="1.7" fill-opacity="0.5"><animate attributeName="fill-opacity" values="0.5;1;0.5" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="150" r="2.2" fill="#c7f24a"><animate attributeName="fill-opacity" values="1;0.5;1" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="120" r="1.5" fill-opacity="0.5"/>
    <circle cx="1140" cy="220" r="1.4" fill-opacity="0.4"><animate attributeName="fill-opacity" values="0.4;0.9;0.4" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="260" r="1.6" fill="#c7f24a" fill-opacity="0.8"/>
    <circle cx="760" cy="300" r="1.5" fill-opacity="0.45"><animate attributeName="fill-opacity" values="0.45;1;0.45" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="250" r="1.3" fill-opacity="0.35"/>
  </g>

  <!-- text -->
  <text x="80" y="120" font-family="'Courier New',monospace" font-size="15" letter-spacing="5" fill="#c7f24a">UNSUPERVISED ML &#183; SEMANTIC RETRIEVAL</text>
  <text x="76" y="196" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="500" fill="url(#title)">The hidden shape</text>
  <text x="76" y="262" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="500" fill="url(#title)">of a city&#8217;s reading.</text>
  <rect x="80" y="290" width="150" height="2" fill="url(#sweep)">
    <animate attributeName="width" values="0;420;0" dur="6s" repeatCount="indefinite"/>
  </rect>
  <text x="80" y="322" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#9b978d">Clustering &#43; semantic search over 119k real Seattle Public Library titles.</text>
</svg>
